services:
  - type: web
    name: web
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: sh -c "daphne -b 0.0.0.0 -p ${PORT:-8000} progress_rpg.asgi:application"
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: progress_rpg.settings.prod
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: worker
    name: celery
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A progress_rpg worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: progress_rpg.settings.prod
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          name: web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString

  - type: worker
    name: celery-beat
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: celery -A progress_rpg beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: progress_rpg.settings.prod
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          name: web
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: redis
          type: keyvalue
          property: connectionString

  - type: keyvalue
    name: redis
    plan: starter
    ipAllowList: []

  - type: web
    name: frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build:production
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: postgres
    plan: basic-256mb
    postgresMajorVersion: "17"
    ipAllowList: []
