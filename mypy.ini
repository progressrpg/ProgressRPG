[mypy]
# Python version
python_version = 3.11

# Plugins
plugins =
    mypy_django_plugin.main,
    mypy_drf_plugin.main

# Output
show_error_codes = true
show_column_numbers = true
pretty = true
color_output = true

# Strictness (start lenient, gradually increase)
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = false
warn_return_any = false
warn_unreachable = true

# Disable strict checks initially (enable gradually per-module)
disallow_untyped_defs = false
disallow_any_generics = false
disallow_subclassing_any = false
check_untyped_defs = true
no_implicit_optional = true

# Allow missing imports for third-party packages without stubs
ignore_missing_imports = true

# Exclude patterns
exclude = (?x)(^.*migrations/.*$|^.*tests/.*$|^venv/.*$|^env/.*$|^staticfiles/.*$|^static/.*$|^media/.*$|^docs/.*$)

# Per-module options - gradually make stricter
[mypy-character.models.*]
ignore_errors = false

[mypy-users.models]
ignore_errors = false

[mypy-*.migrations.*]
ignore_errors = true

[mypy-*.tests.*]
ignore_errors = true

# Django stubs configuration
[mypy.plugins.django-stubs]
django_settings_module = progress_rpg.settings.dev
