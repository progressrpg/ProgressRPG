name: Type Checking

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]

jobs:
  mypy:
    runs-on: ubuntu-latest
    
    env:
      DJANGO_SETTINGS_MODULE: progress_rpg.settings.dev
      SECRET_KEY: type-checking-secret-key
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run mypy
      run: |
        mypy . --config-file=mypy.ini || true
      continue-on-error: true
      
    - name: Type check character app (strict)
      run: |
        mypy character/ --config-file=mypy.ini
      continue-on-error: true

    - name: Report status
      run: |
        echo "Type checking completed. Review output above for errors."
